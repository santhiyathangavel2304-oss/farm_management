<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports & Analytics — AgriGuard AI</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/theme.css">
</head>
<body>
<div class="app-shell">
  <div id="agShellSidebar"></div>
  <div class="main-col" id="agMainCol">
    <div id="agShellTopbar"></div>

    <div class="page-body">

      <div class="glass-card p-3 mb-4 animate-in d-flex flex-wrap justify-content-between align-items-center gap-2">
        <div class="d-flex gap-2 flex-wrap">
          <select class="form-select form-select-sm" style="width:auto;">
            <option>Last 6 Months</option><option>Last 12 Months</option><option>Year to Date</option>
          </select>
          <select class="form-select form-select-sm" style="width:auto;">
            <option>All Farms</option>
            <option>Green Valley Unit</option><option>Riverside Block A</option><option>Riverside Block B</option>
          </select>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-brand btn-sm" onclick="ag_toast('Report exported as PDF','blue','file-earmark-pdf-fill')"><i class="bi bi-file-earmark-pdf me-1"></i>Export PDF</button>
          <button class="btn btn-brand btn-sm" onclick="ag_toast('Report exported as CSV','green','filetype-csv')"><i class="bi bi-download me-1"></i>Export CSV</button>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-lg-6">
          <div class="glass-card p-4 animate-in h-100">
            <div class="section-head"><div><span class="eyebrow">Compliance</span><h2>MRL Compliance Trend</h2></div></div>
            <canvas id="reportMrlTrend" height="230"></canvas>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="glass-card p-4 animate-in h-100">
            <div class="section-head"><div><span class="eyebrow">Usage</span><h2>AMU by Drug Class</h2></div></div>
            <canvas id="reportAmuDonut" height="230"></canvas>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-lg-7">
          <div class="glass-card p-4 animate-in h-100">
            <div class="section-head"><div><span class="eyebrow">Herd composition</span><h2>Species Distribution</h2></div></div>
            <canvas id="reportSpeciesBar" height="220"></canvas>
          </div>
        </div>
        <div class="col-lg-5">
          <div class="glass-card p-4 animate-in h-100">
            <div class="section-head"><div><span class="eyebrow">Risk</span><h2>Compliance vs Non-Compliance</h2></div></div>
            <canvas id="reportCompliancePie" height="220"></canvas>
          </div>
        </div>
      </div>

      <div class="glass-card p-4 animate-in">
        <div class="section-head">
          <div><span class="eyebrow">Summary</span><h2>Farm Performance Snapshot</h2></div>
        </div>
        <div class="table-responsive">
          <table class="table-clean">
            <thead><tr><th>Farm / Block</th><th>Animals</th><th>Active Treatments</th><th>MRL Compliance</th><th>Trend</th></tr></thead>
            <tbody id="farmSummaryBody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  ag_requireAuth();
  ag_initShell('reports', 'Reports & Analytics', 'Farm-wide compliance and usage insights');

  new Chart(document.getElementById('reportMrlTrend'), {
    type:'line',
    data:{
      labels: AG_DATA.mrlComplianceTrend.labels,
      datasets:[{ label:'Compliance %', data: AG_DATA.mrlComplianceTrend.compliance, borderColor:'#155A41', backgroundColor:'rgba(21,90,65,0.08)', fill:true, tension:.4, pointRadius:4 }]
    },
    options:{ responsive:true, plugins:{legend:{display:false}}, scales:{ y:{ min:80,max:100, ticks:{callback:v=>v+'%'} }, x:{grid:{display:false}} } }
  });

  const classCounts = {};
  AG_DATA.amuRecords.forEach(r => { classCounts[r.drugClass] = (classCounts[r.drugClass]||0)+1; });
  new Chart(document.getElementById('reportAmuDonut'), {
    type:'doughnut',
    data:{
      labels: Object.keys(classCounts),
      datasets:[{ data: Object.values(classCounts), backgroundColor:['#155A41','#2B6CB0','#C7912F','#279166','#3E8AD1','#A9761F','#1D7350','#35AC7D'], borderWidth:0 }]
    },
    options:{ responsive:true, plugins:{ legend:{ position:'right', labels:{boxWidth:10,boxHeight:10,usePointStyle:true,font:{size:11}} } }, cutout:'62%' }
  });

  new Chart(document.getElementById('reportSpeciesBar'), {
    type:'bar',
    data:{
      labels: AG_DATA.speciesDistribution.map(s=>s.name),
      datasets:[{ data: AG_DATA.speciesDistribution.map(s=>s.count), backgroundColor:'#279166', borderRadius:8, maxBarThickness:38 }]
    },
    options:{ indexAxis:'y', responsive:true, plugins:{legend:{display:false}}, scales:{ x:{ beginAtZero:true, grid:{color:'rgba(138,150,141,0.15)'} }, y:{ grid:{display:false} } } }
  });

  const compliant = AG_DATA.mrlTests.filter(t=>t.compliant).length;
  new Chart(document.getElementById('reportCompliancePie'), {
    type:'pie',
    data:{ labels:['Compliant','Non-Compliant'], datasets:[{ data:[compliant, AG_DATA.mrlTests.length-compliant], backgroundColor:['#35AC7D','#C13F3F'], borderWidth:0 }] },
    options:{ responsive:true, plugins:{ legend:{ position:'bottom', labels:{boxWidth:10,boxHeight:10,usePointStyle:true} } } }
  });

  // Farm summary table
  const farmRows = AG_DATA.farms.map(farm => {
    const farmAnimals = AG_DATA.animals.filter(a=>a.farm===farm);
    const animalIds = farmAnimals.map(a=>a.id);
    const activeTreatments = AG_DATA.amuRecords.filter(r=>animalIds.includes(r.animalId) && r.status==='In Withdrawal').length;
    const farmMrl = AG_DATA.mrlTests.filter(t=>t.farm===farm);
    const farmCompliant = farmMrl.filter(t=>t.compliant).length;
    const pct = farmMrl.length ? Math.round((farmCompliant/farmMrl.length)*100) : 100;
    return { farm, animals: farmAnimals.length, activeTreatments, pct };
  });

  document.getElementById('farmSummaryBody').innerHTML = farmRows.map(r => `
    <tr>
      <td><strong>${r.farm}</strong></td>
      <td>${r.animals}</td>
      <td>${r.activeTreatments}</td>
      <td>
        <div class="d-flex align-items-center gap-2">
          <div style="width:80px;height:6px;background:var(--surface-border);border-radius:4px;overflow:hidden;">
            <div style="width:${r.pct}%;height:100%;background:linear-gradient(90deg,var(--green-500),var(--green-700));"></div>
          </div>
          <span style="font-size:.8rem;">${r.pct}%</span>
        </div>
      </td>
      <td>${r.pct >= 95 ? `<span class="pill pill-green"><i class="bi bi-arrow-up-right"></i>Excellent</span>` : r.pct >= 85 ? `<span class="pill pill-blue">Stable</span>` : `<span class="pill pill-amber">Needs attention</span>`}</td>
    </tr>
  `).join('');
</script>
</body>
</html>
