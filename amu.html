<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicine & AMU Tracking — AgriGuard AI</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/theme.css">
</head>
<body>
<div class="app-shell">
  <div id="agShellSidebar"></div>
  <div class="main-col" id="agMainCol">
    <div id="agShellTopbar"></div>

    <div class="page-body">

      <div class="row g-3 mb-4">
        <div class="col-6 col-lg-3">
          <div class="glass-card kpi-card hoverable animate-in delay-1">
            <div class="kpi-icon icon-tint-blue"><i class="bi bi-capsule"></i></div>
            <div class="kpi-value" id="statTotalRecords">0</div>
            <div class="kpi-label">Total AMU Records</div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="glass-card kpi-card hoverable animate-in delay-2">
            <div class="kpi-icon icon-tint-amber"><i class="bi bi-hourglass-split"></i></div>
            <div class="kpi-value" id="statInWithdrawal">0</div>
            <div class="kpi-label">In Withdrawal</div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="glass-card kpi-card hoverable animate-in delay-3">
            <div class="kpi-icon icon-tint-green"><i class="bi bi-check-circle-fill"></i></div>
            <div class="kpi-value" id="statCleared">0</div>
            <div class="kpi-label">Cleared for Market</div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="glass-card kpi-card hoverable animate-in delay-4">
            <div class="kpi-icon icon-tint-red"><i class="bi bi-exclamation-diamond-fill"></i></div>
            <div class="kpi-value" id="statEndingSoon">0</div>
            <div class="kpi-label">Ending in ≤ 2 Days</div>
          </div>
        </div>
      </div>

      <div class="glass-card p-4 mb-4 animate-in">
        <div class="section-head">
          <div>
            <span class="eyebrow">Treatment records</span>
            <h2>Medicine &amp; AMU Log</h2>
          </div>
          <button class="btn btn-brand" data-bs-toggle="modal" data-bs-target="#addAmuModal"><i class="bi bi-plus-lg me-1"></i>Log Treatment</button>
        </div>

        <div class="row g-2 mb-3">
          <div class="col-md-4">
            <div class="search-mini" style="width:100%;">
              <i class="bi bi-search"></i>
              <input type="text" id="amuSearch" placeholder="Search by animal or drug…">
            </div>
          </div>
          <div class="col-6 col-md-3">
            <select class="form-select" id="filterDrugClass"><option value="">All Drug Classes</option></select>
          </div>
          <div class="col-6 col-md-3">
            <select class="form-select" id="filterAmuStatus">
              <option value="">All Status</option>
              <option>In Withdrawal</option>
              <option>Cleared</option>
            </select>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table-clean" id="amuTable">
            <thead>
              <tr><th>Record</th><th>Animal</th><th>Drug</th><th>Class</th><th>Dosage</th><th>Route</th><th>Admin Date</th><th>Withdrawal Ends</th><th>Status</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="glass-card p-4 animate-in">
        <div class="section-head">
          <div><span class="eyebrow">Class overview</span><h2>AMU Distribution by Drug Class</h2></div>
        </div>
        <canvas id="amuClassChart" height="90"></canvas>
      </div>

    </div>
  </div>
</div>

<!-- Add AMU Modal -->
<div class="modal fade" id="addAmuModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-capsule me-2"></i>Log New Treatment</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="addAmuForm">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Animal</label>
              <select class="form-select" id="amuAnimalSelect" required></select>
            </div>
            <div class="col-6">
              <label class="form-label">Drug</label>
              <select class="form-select" id="amuDrugSelect" required></select>
            </div>
            <div class="col-6">
              <label class="form-label">Dosage</label>
              <input type="text" class="form-control" placeholder="e.g. 12 mg/kg" required>
            </div>
            <div class="col-6">
              <label class="form-label">Route</label>
              <select class="form-select">
                <option>Intramuscular</option><option>Oral</option><option>Subcutaneous</option><option>Intravenous</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label">Administration Date</label>
              <input type="date" class="form-control" value="2026-07-05">
            </div>
          </div>
          <div class="card-solid p-3 mt-3" id="withdrawalPreview" style="font-size:.85rem; display:none;">
            <i class="bi bi-info-circle me-1" style="color:var(--blue-600);"></i>
            Estimated withdrawal period: <strong id="withdrawalPreviewDays">—</strong> days.
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-brand" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-brand" id="saveAmuBtn">Save Record</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  ag_requireAuth();
  ag_initShell('amu', 'Medicine & AMU Tracking', 'Log and monitor antimicrobial usage and withdrawal periods');

  let filters = { search:'', drugClass:'', status:'' };

  const classes = [...new Set(AG_DATA.drugNames.map(d=>d.class))];
  document.getElementById('filterDrugClass').innerHTML += classes.map(c=>`<option>${c}</option>`).join('');
  document.getElementById('amuAnimalSelect').innerHTML = AG_DATA.animals.map(a=>`<option value="${a.id}">${a.name} (${a.id})</option>`).join('');
  document.getElementById('amuDrugSelect').innerHTML = AG_DATA.drugNames.map(d=>`<option value="${d.withdrawal}">${d.name} — ${d.class}</option>`).join('');

  document.getElementById('amuDrugSelect').addEventListener('change', function(){
    const days = this.value;
    document.getElementById('withdrawalPreview').style.display = 'block';
    document.getElementById('withdrawalPreviewDays').textContent = days;
  });

  function statusBadge(r){
    if(r.status === 'Cleared') return `<span class="pill pill-green"><span class="pill-dot"></span>Cleared</span>`;
    if(r.daysLeft <= 2) return `<span class="pill pill-red"><span class="pill-dot"></span>Ending soon</span>`;
    return `<span class="pill pill-amber"><span class="pill-dot"></span>In Withdrawal</span>`;
  }

  function renderAmuTable(){
    let list = AG_DATA.amuRecords.filter(r => {
      const matchSearch = (r.animalName + r.drug).toLowerCase().includes(filters.search.toLowerCase());
      const matchClass = !filters.drugClass || r.drugClass === filters.drugClass;
      const matchStatus = !filters.status || r.status === filters.status;
      return matchSearch && matchClass && matchStatus;
    }).sort((a,b) => a.daysLeft - b.daysLeft);

    document.querySelector('#amuTable tbody').innerHTML = list.map(r => `
      <tr>
        <td class="mono">${r.id}</td>
        <td><strong>${r.animalName}</strong><br><span class="text-muted-custom mono" style="font-size:.72rem;">${r.animalId}</span></td>
        <td>${r.drug}</td>
        <td><span class="text-muted-custom">${r.drugClass}</span></td>
        <td>${r.dosage}</td>
        <td>${r.route}</td>
        <td>${r.dateAdmin}</td>
        <td>${r.withdrawalEnd} ${r.status==='In Withdrawal' ? `<span class="text-muted-custom">(${r.daysLeft}d)</span>` : ''}</td>
        <td>${statusBadge(r)}</td>
      </tr>
    `).join('') || `<tr><td colspan="9" class="text-center text-muted-custom py-4">No records match your filters.</td></tr>`;

    document.getElementById('statTotalRecords').textContent = AG_DATA.amuRecords.length;
    document.getElementById('statInWithdrawal').textContent = AG_DATA.amuRecords.filter(r=>r.status==='In Withdrawal').length;
    document.getElementById('statCleared').textContent = AG_DATA.amuRecords.filter(r=>r.status==='Cleared').length;
    document.getElementById('statEndingSoon').textContent = AG_DATA.amuRecords.filter(r=>r.status==='In Withdrawal' && r.daysLeft<=2).length;
  }

  document.getElementById('amuSearch').addEventListener('input', e => { filters.search = e.target.value; renderAmuTable(); });
  document.getElementById('filterDrugClass').addEventListener('change', e => { filters.drugClass = e.target.value; renderAmuTable(); });
  document.getElementById('filterAmuStatus').addEventListener('change', e => { filters.status = e.target.value; renderAmuTable(); });

  document.getElementById('saveAmuBtn').addEventListener('click', () => {
    bootstrap.Modal.getInstance(document.getElementById('addAmuModal')).hide();
    ag_toast('Treatment record logged successfully', 'green', 'check-circle-fill');
    document.getElementById('addAmuForm').reset();
    document.getElementById('withdrawalPreview').style.display = 'none';
  });

  renderAmuTable();

  // Class distribution chart
  const classCounts = {};
  AG_DATA.amuRecords.forEach(r => { classCounts[r.drugClass] = (classCounts[r.drugClass]||0)+1; });
  new Chart(document.getElementById('amuClassChart'), {
    type:'bar',
    data:{
      labels: Object.keys(classCounts),
      datasets:[{
        label:'Records',
        data: Object.values(classCounts),
        backgroundColor: ['#155A41','#2B6CB0','#C7912F','#279166','#3E8AD1','#A9761F','#1D7350','#35AC7D'],
        borderRadius: 8,
        maxBarThickness: 46
      }]
    },
    options:{
      responsive:true,
      plugins:{ legend:{ display:false } },
      scales:{ x:{ grid:{ display:false } }, y:{ grid:{ color:'rgba(138,150,141,0.15)' }, beginAtZero:true } }
    }
  });
</script>
</body>
</html>
