<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications — AgriGuard AI</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/theme.css">
<style>
  .notif-item{
    display:flex; gap:1rem; padding: 1rem; border-radius: var(--radius-md);
    border:1px solid transparent; transition: all var(--transition-fast); cursor:pointer;
  }
  .notif-item:hover{ background: var(--surface-solid); border-color: var(--surface-border); }
  .notif-item.unread{ background: rgba(53,172,125,0.05); }
  .notif-icon{ width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:1.1rem; }
  .filter-tab{
    padding:.5rem 1rem; border-radius: var(--radius-pill); font-size:.83rem; font-weight:600; cursor:pointer;
    color: var(--text-secondary); border:1px solid var(--surface-border); background: var(--surface-solid);
  }
  .filter-tab.active{ background: linear-gradient(135deg,var(--green-700),var(--green-600)); color:#fff; border-color:transparent; }
</style>
</head>
<body>
<div class="app-shell">
  <div id="agShellSidebar"></div>
  <div class="main-col" id="agMainCol">
    <div id="agShellTopbar"></div>

    <div class="page-body">
      <div class="glass-card p-4 animate-in">
        <div class="section-head">
          <div><span class="eyebrow">Alert center</span><h2>Notifications</h2></div>
          <button class="btn btn-outline-brand btn-sm" id="markAllReadBtn"><i class="bi bi-check2-all me-1"></i>Mark all as read</button>
        </div>

        <div class="d-flex gap-2 mb-4 flex-wrap">
          <div class="filter-tab active" data-filter="all">All</div>
          <div class="filter-tab" data-filter="alert">Alerts</div>
          <div class="filter-tab" data-filter="warning">Warnings</div>
          <div class="filter-tab" data-filter="info">Info</div>
          <div class="filter-tab" data-filter="success">Success</div>
        </div>

        <div id="notifList"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  ag_requireAuth();
  ag_initShell('notifications', 'Notifications', 'Stay on top of alerts across your farm');

  let notifs = JSON.parse(JSON.stringify(AG_DATA.notifications));
  let currentFilter = 'all';

  function renderNotifs(){
    const list = notifs.filter(n => currentFilter === 'all' || n.type === currentFilter);
    document.getElementById('notifList').innerHTML = list.map(n => `
      <div class="notif-item ${!n.read ? 'unread' : ''}" onclick="ag_markRead(${n.id})">
        <div class="notif-icon icon-tint-${n.tint}"><i class="bi bi-${n.icon}"></i></div>
        <div class="flex-grow-1">
          <div class="d-flex justify-content-between align-items-start">
            <strong style="font-size:.9rem;">${n.title}</strong>
            <span class="text-muted-custom" style="font-size:.75rem; white-space:nowrap; margin-left:.5rem;">${n.time}</span>
          </div>
          <p class="text-muted-custom mb-0 mt-1" style="font-size:.84rem;">${n.body}</p>
        </div>
        ${!n.read ? '<div class="pulse-dot" style="width:8px;height:8px;border-radius:50%;background:var(--green-500);margin-top:6px; flex-shrink:0;"></div>' : ''}
      </div>
    `).join('') || `<p class="text-center text-muted-custom py-4">No notifications in this category.</p>`;
  }

  function ag_markRead(id){
    const n = notifs.find(x=>x.id===id);
    if(n) n.read = true;
    renderNotifs();
  }

  document.getElementById('markAllReadBtn').addEventListener('click', () => {
    notifs.forEach(n => n.read = true);
    renderNotifs();
    ag_toast('All notifications marked as read', 'green', 'check2-all');
  });

  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', function(){
      document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
      this.classList.add('active');
      currentFilter = this.dataset.filter;
      renderNotifs();
    });
  });

  renderNotifs();
</script>
</body>
</html>
