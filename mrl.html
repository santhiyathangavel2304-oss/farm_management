<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRL Monitoring — AgriGuard AI</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/theme.css">
</head>
<body>
<div class="app-shell">
  <div id="agShellSidebar"></div>
  <div class="main-col" id="agMainCol">
    <div id="agShellTopbar"></div>

    <div class="page-body">

      <div class="row g-3 mb-4">
        <div class="col-lg-4">
          <div class="glass-card p-4 h-100 animate-in d-flex flex-column align-items-center justify-content-center text-center">
            <div class="gauge-wrap mb-2">
              <svg width="160" height="160" viewBox="0 0 160 160">
                <circle cx="80" cy="80" r="66" fill="none" stroke="var(--surface-border)" stroke-width="12"/>
                <circle id="mrlGaugeArc" cx="80" cy="80" r="66" fill="none" stroke="url(#mrlGaugeGrad)" stroke-width="12" stroke-linecap="round" stroke-dasharray="415" stroke-dashoffset="415"/>
                <defs><linearGradient id="mrlGaugeGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#35AC7D"/><stop offset="100%" stop-color="#2B6CB0"/></linearGradient></defs>
              </svg>
              <div class="gauge-label"><strong id="mrlGaugePct">0%</strong><span>Compliant</span></div>
            </div>
            <p class="text-muted-custom mb-0" style="font-size:.85rem;">of tested samples are within safe residue limits</p>
          </div>
        </div>
        <div class="col-lg-8">
          <div class="row g-3 h-100">
            <div class="col-6">
              <div class="glass-card kpi-card hoverable h-100 animate-in delay-1">
                <div class="kpi-icon icon-tint-green"><i class="bi bi-check-circle-fill"></i></div>
                <div class="kpi-value" id="statCompliant">0</div>
                <div class="kpi-label">Compliant Tests</div>
              </div>
            </div>
            <div class="col-6">
              <div class="glass-card kpi-card hoverable h-100 animate-in delay-2">
                <div class="kpi-icon icon-tint-red"><i class="bi bi-x-octagon-fill"></i></div>
                <div class="kpi-value" id="statFlagged">0</div>
                <div class="kpi-label">Flagged / Exceedance</div>
              </div>
            </div>
            <div class="col-6">
              <div class="glass-card kpi-card hoverable h-100 animate-in delay-3">
                <div class="kpi-icon icon-tint-blue"><i class="bi bi-clipboard-data-fill"></i></div>
                <div class="kpi-value" id="statTotalTests">0</div>
                <div class="kpi-label">Total Tests Logged</div>
              </div>
            </div>
            <div class="col-6">
              <div class="glass-card kpi-card hoverable h-100 animate-in delay-4">
                <div class="kpi-icon icon-tint-amber"><i class="bi bi-flask"></i></div>
                <div class="kpi-value">3</div>
                <div class="kpi-label">Partner Labs</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="glass-card p-4 mb-4 animate-in">
        <div class="section-head">
          <div><span class="eyebrow">Trend</span><h2>Monthly MRL Compliance Rate</h2></div>
        </div>
        <canvas id="mrlTrendChart" height="80"></canvas>
      </div>

      <div class="glass-card p-4 animate-in">
        <div class="section-head">
          <div><span class="eyebrow">Test records</span><h2>Residue Test Results</h2></div>
          <button class="btn btn-brand" data-bs-toggle="modal" data-bs-target="#addMrlModal"><i class="bi bi-plus-lg me-1"></i>Log Test Result</button>
        </div>

        <div class="row g-2 mb-3">
          <div class="col-md-4">
            <div class="search-mini" style="width:100%;">
              <i class="bi bi-search"></i>
              <input type="text" id="mrlSearch" placeholder="Search by animal or substance…">
            </div>
          </div>
          <div class="col-6 col-md-3">
            <select class="form-select" id="filterCompliance">
              <option value="">All Results</option>
              <option value="pass">Compliant</option>
              <option value="fail">Non-compliant</option>
            </select>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table-clean" id="mrlTable">
            <thead><tr><th>Test ID</th><th>Animal</th><th>Substance</th><th>Tissue</th><th>Measured</th><th>Limit</th><th>Result</th><th>Lab</th><th>Date</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Add MRL Modal -->
<div class="modal fade" id="addMrlModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-shield-check me-2"></i>Log Residue Test</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="addMrlForm">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Animal</label>
              <select class="form-select" id="mrlAnimalSelect"></select>
            </div>
            <div class="col-6">
              <label class="form-label">Substance</label>
              <select class="form-select" id="mrlSubstanceSelect"></select>
            </div>
            <div class="col-6">
              <label class="form-label">Measured Value (µg/kg)</label>
              <input type="number" class="form-control" placeholder="e.g. 85" required>
            </div>
            <div class="col-6">
              <label class="form-label">Testing Lab</label>
              <select class="form-select">
                <option>AgriLab Chennai</option><option>VetDiagnostics South</option><option>NationalFoodSafetyLab</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label">Test Date</label>
              <input type="date" class="form-control" value="2026-07-05">
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-brand" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-brand" id="saveMrlBtn">Save Result</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  ag_requireAuth();
  ag_initShell('mrl', 'MRL Monitoring', 'Track residue test results against safe limit thresholds');

  document.getElementById('mrlAnimalSelect').innerHTML = AG_DATA.animals.map(a=>`<option value="${a.id}">${a.name} (${a.id})</option>`).join('');
  document.getElementById('mrlSubstanceSelect').innerHTML = AG_DATA.mrlSubstances.map(s=>`<option>${s.substance} — ${s.tissue}</option>`).join('');

  let filters = { search:'', compliance:'' };

  function renderMrlTable(){
    let list = AG_DATA.mrlTests.filter(t => {
      const matchSearch = (t.animalName + t.substance).toLowerCase().includes(filters.search.toLowerCase());
      const matchCompliance = !filters.compliance || (filters.compliance==='pass' ? t.compliant : !t.compliant);
      return matchSearch && matchCompliance;
    }).sort((a,b) => (a.compliant === b.compliant) ? 0 : a.compliant ? 1 : -1);

    document.querySelector('#mrlTable tbody').innerHTML = list.map(t => `
      <tr>
        <td class="mono">${t.id}</td>
        <td><strong>${t.animalName}</strong><br><span class="text-muted-custom" style="font-size:.72rem;">${t.farm}</span></td>
        <td>${t.substance}</td>
        <td>${t.tissue}</td>
        <td class="${t.compliant?'':'fw-bold'}" style="${t.compliant?'':'color:var(--red-600);'}">${t.measured} ${t.unit}</td>
        <td>${t.limit} ${t.unit}</td>
        <td>${t.compliant ? `<span class="pill pill-green"><span class="pill-dot"></span>Compliant</span>` : `<span class="pill pill-red"><span class="pill-dot"></span>Exceeded</span>`}</td>
        <td>${t.lab}</td>
        <td>${t.testDate}</td>
      </tr>
    `).join('') || `<tr><td colspan="9" class="text-center text-muted-custom py-4">No results match your filters.</td></tr>`;

    const compliant = AG_DATA.mrlTests.filter(t=>t.compliant).length;
    document.getElementById('statCompliant').textContent = compliant;
    document.getElementById('statFlagged').textContent = AG_DATA.mrlTests.length - compliant;
    document.getElementById('statTotalTests').textContent = AG_DATA.mrlTests.length;
  }

  document.getElementById('mrlSearch').addEventListener('input', e => { filters.search = e.target.value; renderMrlTable(); });
  document.getElementById('filterCompliance').addEventListener('change', e => { filters.compliance = e.target.value; renderMrlTable(); });

  document.getElementById('saveMrlBtn').addEventListener('click', () => {
    bootstrap.Modal.getInstance(document.getElementById('addMrlModal')).hide();
    ag_toast('Residue test result logged', 'blue', 'flask');
    document.getElementById('addMrlForm').reset();
  });

  renderMrlTable();

  // Gauge
  const compliantCount = AG_DATA.mrlTests.filter(t=>t.compliant).length;
  const pct = Math.round((compliantCount/AG_DATA.mrlTests.length)*100);
  const circumference = 2*Math.PI*66;
  const arc = document.getElementById('mrlGaugeArc');
  setTimeout(()=>{
    arc.style.transition = 'stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)';
    arc.setAttribute('stroke-dashoffset', circumference - (pct/100)*circumference);
  }, 200);
  document.getElementById('mrlGaugePct').textContent = pct + '%';

  // Trend chart
  new Chart(document.getElementById('mrlTrendChart'), {
    type:'line',
    data:{
      labels: AG_DATA.mrlComplianceTrend.labels,
      datasets:[{
        label:'Compliance %',
        data: AG_DATA.mrlComplianceTrend.compliance,
        borderColor:'#2B6CB0',
        backgroundColor:'rgba(43,108,176,0.1)',
        fill:true, tension:.4, pointRadius:4, pointBackgroundColor:'#2B6CB0'
      }]
    },
    options:{
      responsive:true,
      plugins:{ legend:{ display:false } },
      scales:{ x:{ grid:{ display:false } }, y:{ min:80, max:100, grid:{ color:'rgba(138,150,141,0.15)' }, ticks:{ callback:v=>v+'%' } } }
    }
  });
</script>
</body>
</html>
